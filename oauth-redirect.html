<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TPRO - 인증 처리 중</title>
  <style>
    body { 
      font-family: -apple-system, sans-serif; 
      padding: 40px; 
      max-width: 600px; 
      margin: 0 auto; 
      background: #0a0a0b; 
      color: #fff; 
      text-align: center;
    }
    h1 { color: #C6F84E; }
    .box { 
      background: #1a1a1c; 
      padding: 24px; 
      border-radius: 12px; 
      margin: 20px 0; 
    }
    .err { color: #f87171; }
    .code { 
      font-family: monospace; 
      background: #0a0a0b; 
      padding: 8px; 
      border-radius: 6px; 
      word-break: break-all; 
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🚗 TPRO</h1>
  <div class="box">
    <h2 id="title">Tesla 인증 처리 중...</h2>
    <p id="msg">잠시만 기다려주세요.</p>
    <div id="detail" class="code" style="display:none;"></div>
  </div>
  <script>
    // NAS 백엔드 URL
    const BACKEND_URL = 'https://inbs.synology.me/api/auth/callback';
    
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDesc = params.get('error_description');
    
    const titleEl = document.getElementById('title');
    const msgEl = document.getElementById('msg');
    const detailEl = document.getElementById('detail');
    
    if (error) {
      titleEl.innerHTML = '❌ <span class="err">인증 실패</span>';
      msgEl.textContent = errorDesc || error;
      detailEl.style.display = 'block';
      detailEl.textContent = 'error: ' + error;
    } else if (!code) {
      titleEl.innerHTML = '❌ <span class="err">인증 코드 없음</span>';
      msgEl.textContent = 'Tesla로부터 코드를 받지 못했습니다.';
    } else {
      // NAS 백엔드로 리다이렉트
      const target = BACKEND_URL + 
        '?code=' + encodeURIComponent(code) + 
        '&state=' + encodeURIComponent(state || '');
      
      msgEl.textContent = 'NAS 서버로 전달 중...';
      
      // 0.5초 후 리다이렉트 (사용자가 메시지 볼 수 있도록)
      setTimeout(() => {
        window.location.href = target;
      }, 500);
    }
  </script>
</body>
</html>
