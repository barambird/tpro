<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TPRO - 인증 처리 중</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f4f4f5; border-top-color: #E31937; border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { background: #fee; padding: 16px; border-radius: 8px; color: #c00; word-break: break-all; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🚗 TPRO 인증 처리 중...</h1>
  <div class="spinner" id="spinner"></div>
  <p id="status">Tesla 인증 코드를 GAS로 전달합니다...</p>
  <div id="result"></div>

  <script>
    // ⚠️ 본인의 GAS /exec URL로 변경하세요
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby6pbc4bonjsh9i6vhV9561slwziAE_ijVmjjJ7fZL3eOmiqaX6g081lxoFCugRu0YsvQ/exec';

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    if (error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '<div class="err">❌ OAuth 에러: ' + error + '</div>';
    } else if (!code) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '<div class="err">❌ 인증 코드가 없습니다.</div>';
    } else {
      // 브라우저를 GAS로 직접 이동 (CORS 우회)
      const targetUrl = GAS_URL 
        + '?path=oauth/callback'
        + '&code=' + encodeURIComponent(code)
        + '&state=' + encodeURIComponent(state || '');
      
      // 1초 후 자동 이동 (스피너 잠깐 보여주기)
      setTimeout(() => {
        window.location.href = targetUrl;
      }, 500);
    }
  </script>
</body>
</html>
